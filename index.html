<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Libros Voladores</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="header-inner">
        <img src="img/logo.png" alt="Libros Voladores" class="logo">
        <h1 class="site-title">Libros Voladores</h1>
      </div>
      <p class="slogan">¡Deja que tus libros sigan volando!</p>
    </header>

    <main class="main">
      <section class="hero">
        <button class="cta">Compramos libros infantiles ilustrados en inglés y castellano.</button>
        <p class="subtext">*Retiramos en Providencia, Vitacura, Las Condes y Lo Barnechea.</p>
      </section>

      <section class="carousel-section">
        <div class="carousel">
          <button class="prev">❮</button>
          <div class="carousel-track">
            <img src="img/libro1.jpg" alt="Libro 1" class="carousel-img">
            <img src="img/libro2.jpg" alt="Libro 2" class="carousel-img">
            <img src="img/libro3.jpg" alt="Libro 3" class="carousel-img">
          </div>
          <button class="next">❯</button>
        </div>
      </section>

      <section class="social">
        <h2>¿Cómo funciona?</h2>
        <p>Escríbenos</p>
        <div class="social-buttons">
          <a href="https://instagram.com/librosvoladores_cl" target="_blank">
            <img src="img/instagram.png" alt="Instagram">
          </a>
          <a href="https://wa.me/56971356706?text=¡Hola%20somos%20Libros%20Voladores!%20Mándanos:%0A1)%20Foto%20de%20la%20portada%20de%20tu%20libro.%0A2)%20Fotos%20de%20los%20detalles%20de%20uso.%0A3)%20Título%20y%20autor.%0A4)%20Tu%20nombre." target="_blank">
            <img src="img/whatsapp.png" alt="WhatsApp">
          </a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <img src="img/logo.png" alt="Libros Voladores" class="footer-logo">
      <span>Libros Voladores 2025 ®</span>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
